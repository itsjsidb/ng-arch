services:
  ng-arch-prod:
    build:
      context: .
      dockerfile: Dockerfile
    image: ng-arch:latest
    ports:
      - "8080:8080"

  ng-arch-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "4200:4200"
    develop:
      watch:
        - action: sync
          path: .
          target: /app


  angular-test:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: ["npm", "run", "test"]